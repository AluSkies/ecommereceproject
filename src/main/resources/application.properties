spring.application.name=demo
server.port=4002
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_bd
spring.datasource.username=administrator
spring.datasource.password=admin1234

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# "update" preserves existing data across restarts while still applying entity
# changes to the schema. Use "create" only when you want a clean DB.
spring.jpa.hibernate.ddl-auto=update

# Disable Spring SQL init (schema.sql/data.sql) so Hibernate controls DDL and
# the dev seed does not wipe runtime data on every boot. To re-seed manually:
#   docker exec -i tempus-mysql mysql -u administrator -padmin1234 ecommerce_bd \
#     < src/main/resources/data.sql
spring.sql.init.mode=never

#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

